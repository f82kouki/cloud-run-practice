server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA対応: 全パスを index.html にフォールバック
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ビルド済みアセットは長期キャッシュ
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
